site_name: Agentic Kernel
site_description: A microkernel agent runtime — TypeScript + Python, feature-paired.
site_url: https://agentic-kernel.github.io/agentic-kernel-docs/
repo_url: https://github.com/agentic-kernel/agentic-kernel-docs
repo_name: agentic-kernel/agentic-kernel-docs
copyright: Apache-2.0

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

plugins:
  - search
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true
          site_name: Agentic Kernel(中文)
          nav_translations:
            Home: 首页
            Guide: 使用指南
            Getting started: 快速上手
            Architecture: 架构
            Memory: 记忆
            On-device models: 端侧模型
            Multi-agent orchestration: 多 Agent 编排
            Token usage: Token 用量
            Installation: 安装
            Manual: 完整手册
            Developer guide: 开发者指南
            Development records: 开发记录
            Overview: 概览
            Design notes: 设计说明

# Two pillars: user-facing Guide (strictly bilingual) + Development records
# (English-original archive; Chinese overview pages provided where useful).
nav:
  - Home: index.md
  - Guide:
      - Getting started: guides/getting-started.md
      - Architecture: architecture.md
      - Memory: guides/memory.md
      - On-device models: guides/on-device.md
      - Multi-agent orchestration: guides/multi-agent.md
      - Token usage: guides/token-usage.md
      - Installation: guides/consuming-packages.md
      - Manual: manuals/manual.md
      - Developer guide: manuals/developer-guide.md
  - Development records:
      - Overview: reports/index.md
      - Design notes: design/model-ondevice-adapter.md
      - 2026-06-15 Comprehensive real-LLM campaign: reports/2026-06-15-comprehensive-real-llm-campaign.md
      - 2026-06-13 Full test report: reports/2026-06-13-agent-kernel-full-test-report.md
      - 2026-06-13 Remote-model stress: reports/2026-06-13-remote-model-framework-stress.md
      - 2026-06-12 On-device campaign: reports/2026-06-12-ondevice-testing-campaign.md
      - 2026-06-11 Capability & reliability: reports/2026-06-11-ondevice-capability-reliability.md
      - 2026-06-10 On-device long run: reports/2026-06-10-model-ondevice-longrun.md
      - 2026-06-09 On-device performance: reports/2026-06-09-model-ondevice-perf.md
      - 2026-05-30 Official benchmarks: reports/2026-05-30-official-agent-benchmark-run.md
